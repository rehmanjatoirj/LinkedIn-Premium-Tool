<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkedIn Premium Tool</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 350px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        color: #111;
      }
      .row {
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        padding: 8px 10px;
        margin: 6px 0;
        border: 1px solid #cfcfcf;
        background: #f7f7f7;
        border-radius: 6px;
        cursor: pointer;
      }
      button.primary {
        background: #1a73e8;
        border-color: #1a73e8;
        color: #fff;
      }
      button.danger {
        background: #fff;
        border-color: #d9534f;
        color: #d9534f;
      }
      .small {
        color: #555;
        font-size: 12px;
      }
      input[type="number"] {
        width: 90px;
        padding: 6px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid2 {
        display: grid;
        grid-template-columns: 1fr 120px;
        gap: 8px;
        align-items: center;
      }
      .status {
        padding: 8px;
        background: #f3f6ff;
        border: 1px solid #dbe5ff;
        border-radius: 8px;
        margin-bottom: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }
      th, td {
        border-bottom: 1px solid #eee;
        padding: 6px 4px;
        vertical-align: top;
      }
      th {
        font-size: 12px;
        text-align: left;
        color: #333;
      }
      td.url {
        font-size: 11px;
        word-break: break-all;
        color: #0b57d0;
      }
      .listWrap {
        max-height: 320px;
        overflow: auto;
      }
      .checkbox {
        transform: translateY(1px);
      }
      .mutedLink {
        color: inherit;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="status">
      <div><b>Collected leads:</b> <span id="count">0</span></div>
      <div class="small" id="sub">Ready</div>
    </div>

    <div class="row">
      <label>
        <input id="collectAll" class="checkbox" type="checkbox" />
        Collect all pages
      </label>
    </div>

    <div class="row grid2">
      <label for="delay">
        <span>Delay (ms)</span>
      </label>
      <input id="delay" type="number" min="0" step="50" value="650" />
    </div>

    <div class="row">
      <button id="start" class="primary">Start Collecting</button>
      <button id="export">Export CSV</button>
      <button id="copy">Copy All URLs</button>
      <button id="clear" class="danger">Clear All</button>
    </div>

    <div class="listWrap" id="listWrap">
      <table>
        <thead>
          <tr>
            <th style="width: 40%">Name</th>
            <th>LinkedIn URL</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
